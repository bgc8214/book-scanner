name: Build BookScanner

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build macOS app
        run: pyinstaller BookScanner.spec --noconfirm

      - name: Create DMG
        run: |
          hdiutil create -volname "BookScanner" -srcfolder dist/BookScanner.app -ov -format UDZO dist/BookScanner_macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookScanner-macOS
          path: dist/BookScanner_macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows exe
        run: pyinstaller BookScanner_win.spec --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookScanner-Windows
          path: dist/BookScanner.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BookScanner-macOS/BookScanner_macOS.dmg
            BookScanner-Windows/BookScanner.exe
          generate_release_notes: true
